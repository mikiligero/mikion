<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070912"/>
      <stop offset="0.55" stop-color="#0e1430"/>
      <stop offset="1" stop-color="#1b1538"/>
    </linearGradient>
    <radialGradient id="nebula" cx="0.7" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#7a4dd6" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#3b6ad6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3b6ad6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="0.2" cy="0.8" r="0.5">
      <stop offset="0" stop-color="#c75c37" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#c75c37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planet" cx="0.35" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#e3a36b"/>
      <stop offset="0.6" stop-color="#b9692f"/>
      <stop offset="1" stop-color="#5a2f15"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="400" fill="url(#sky)"/>
  <rect width="1600" height="400" fill="url(#nebula)"/>
  <rect width="1600" height="400" fill="url(#nebula2)"/>

  <!-- Planeta -->
  <circle cx="1230" cy="150" r="92" fill="url(#planet)"/>
  <ellipse cx="1230" cy="150" rx="150" ry="34" fill="none" stroke="#e6c79a" stroke-opacity="0.5" stroke-width="6" transform="rotate(-18 1230 150)"/>

  <!-- Estrellas -->
  <g fill="#ffffff">
    <circle cx="80" cy="60" r="1.6" opacity="0.9"/>
    <circle cx="160" cy="120" r="1.1" opacity="0.6"/>
    <circle cx="240" cy="40" r="2" opacity="0.95"/>
    <circle cx="300" cy="180" r="1" opacity="0.5"/>
    <circle cx="370" cy="90" r="1.4" opacity="0.8"/>
    <circle cx="440" cy="220" r="1.2" opacity="0.6"/>
    <circle cx="520" cy="50" r="1.8" opacity="0.9"/>
    <circle cx="560" cy="150" r="1" opacity="0.5"/>
    <circle cx="640" cy="100" r="1.5" opacity="0.85"/>
    <circle cx="700" cy="260" r="1.1" opacity="0.6"/>
    <circle cx="760" cy="70" r="2.1" opacity="0.95"/>
    <circle cx="820" cy="200" r="1" opacity="0.5"/>
    <circle cx="900" cy="120" r="1.5" opacity="0.8"/>
    <circle cx="960" cy="300" r="1.2" opacity="0.6"/>
    <circle cx="1020" cy="60" r="1.7" opacity="0.9"/>
    <circle cx="1080" cy="230" r="1" opacity="0.5"/>
    <circle cx="1140" cy="320" r="1.3" opacity="0.7"/>
    <circle cx="1320" cy="280" r="1.6" opacity="0.85"/>
    <circle cx="1400" cy="90" r="1.1" opacity="0.6"/>
    <circle cx="1460" cy="190" r="2" opacity="0.95"/>
    <circle cx="1520" cy="320" r="1.2" opacity="0.6"/>
    <circle cx="1560" cy="60" r="1.5" opacity="0.8"/>
    <circle cx="120" cy="300" r="1.3" opacity="0.7"/>
    <circle cx="220" cy="340" r="1" opacity="0.5"/>
    <circle cx="400" cy="330" r="1.6" opacity="0.85"/>
    <circle cx="600" cy="350" r="1.1" opacity="0.6"/>
    <circle cx="880" cy="40" r="1.4" opacity="0.8"/>
  </g>
  <circle cx="240" cy="40" r="6" fill="url(#glow)"/>
  <circle cx="760" cy="70" r="6" fill="url(#glow)"/>
  <circle cx="1460" cy="190" r="6" fill="url(#glow)"/>
</svg>
