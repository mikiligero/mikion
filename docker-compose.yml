services:
  db:
    image: postgres:16-alpine
    container_name: notion-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: notion
      POSTGRES_PASSWORD: notion
      POSTGRES_DB: notion
    ports:
      - "5433:5432"
    volumes:
      - notion-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notion -d notion"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  notion-db-data:
